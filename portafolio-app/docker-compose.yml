version: '3.8'

services:
  portafolio-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portafolio_app
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/database.sqlite
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
